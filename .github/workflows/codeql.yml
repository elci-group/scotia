name: CodeQL

# Static analysis for the Rust codebase. CodeQL's Rust support builds the crate
# and queries the resulting IR for injection, unsafe-usage, and logic bugs. The
# crate lives in scotia/, so we use a manual build (autobuild would look for
# Cargo.toml at the repo root and miss it).

on:
  push:
    branches: [master, main]
    paths:
      - 'scotia/**'
  pull_request:
    branches: [master, main]
    paths:
      - 'scotia/**'
  schedule:
    # Weekly, off the round-minute herd.
    - cron: '17 3 * * 1'
  workflow_dispatch:

defaults:
  run:
    working-directory: scotia

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [rust]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build (manual, in scotia/)
        run: cargo build --bins

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
