name: Release signing

# Builds the Linux x86_64 asset, produces SHA256SUMS, uploads them to the
# release, and — when the MINISIGN_SECRET_KEY repository secret is present —
# signs the manifest with minisign and uploads SHA256SUMS.minisig alongside.
#
# Assets are uploaded BEFORE signing so a missing signing key can never block a
# release: without the secret the run emits a warning and ships an unsigned but
# complete release. If the secret IS present and minisign itself fails, the run
# fails loud. The minisign PUBLIC key paired with MINISIGN_SECRET_KEY must be
# the value pinned as MINISIGN_PUBKEY in
# scotia/scotia.tech/downloads/install-scotia.sh — otherwise installer
# verification will (correctly) reject the manifest.
#
# Optional repository secret:
#   MINISIGN_SECRET_KEY  contents of the minisign secret key file
#                        (generate with: minisign -G -p minisign.pub -s minisign.key)
#
# Triggers are repo-global (a published release, a pushed v* tag, or a manual
# dispatch); the build itself runs inside the scotia/ subdirectory via the
# working-directory default. On a tag push with no release yet, the upload steps
# warn and skip — publishing the release re-triggers the workflow.

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to (re)build and upload assets for'
        required: true

env:
  CARGO_TERM_COLOR: always
  ASSET: scotia-linux-x64
  CHECKSUM_FILE: SHA256SUMS
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

defaults:
  run:
    working-directory: scotia

permissions:
  contents: write

jobs:
  sign:
    name: Build, checksum, sign
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: scotia

      - name: Build release binaries
        run: cargo build --release --bins

      - name: Stage asset
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/scotia "dist/$ASSET"
          (cd dist && sha256sum "$ASSET" > "$CHECKSUM_FILE")

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::warning::No release exists for ${RELEASE_TAG} yet; skipping asset upload (the release:published trigger will re-run this workflow)."
            exit 0
          fi
          gh release upload "${RELEASE_TAG}" \
            "dist/$ASSET" \
            "dist/$CHECKSUM_FILE" \
            --clobber

      - name: Install minisign
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y minisign

      - name: Sign manifest
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${MINISIGN_SECRET_KEY:-}" ]]; then
            echo "::warning::MINISIGN_SECRET_KEY is not set; release ships UNSIGNED. Add the repository secret to enable minisign signatures."
            exit 0
          fi
          keyfile="$(mktemp)"
          chmod 600 "$keyfile"
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$keyfile"
          (cd dist && minisign -S -s "$keyfile" -m "$CHECKSUM_FILE" -x "${CHECKSUM_FILE}.minisig")
          rm -f "$keyfile"
          echo "Signed manifest:"
          cat "dist/${CHECKSUM_FILE}.minisig"

      - name: Upload signature
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ ! -f "dist/${CHECKSUM_FILE}.minisig" ]]; then
            echo "No signature produced; nothing to upload."
            exit 0
          fi
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::warning::No release exists for ${RELEASE_TAG} yet; skipping signature upload."
            exit 0
          fi
          gh release upload "${RELEASE_TAG}" \
            "dist/${CHECKSUM_FILE}.minisig" \
            --clobber
