# kaptaind configuration — auto-generated by `kaptaind-cli init`

# fract's daemon owns the default 9090; run scotia's health endpoint on 9091
health_port = 9091

[watch]
path = "."
recursive = true
ignore_file = ".kaptainignore"

[cluster]
window = 5
# max_paths = 0      # flush cluster after N events (0 = disabled)
# flush_after = 10   # idle timeout in seconds (defaults to window)

[weights]
s = 0.35
a = 0.30
d = 0.20
r = 0.15

[push]
enabled = false
branch = "main"

[angler.git_hooks]
# Deliberately disabled: the git root here is the /home/sal monorepo, so hooks
# would fire on every project sharing the outer repo. Since v9.7.17 this is a
# safe choice rather than a workaround — kaptaind resolves the real hooks dir
# and skips monorepo subprojects instead of fabricating a scotia/.git.
enabled = false

[ratelimit]
# Default (10s). The old 30s cascade throttle was removed in v9.8.0: the
# self-write guard fixed the writeback cascade at the root. This section is
# kept only because the config schema currently makes [ratelimit] mandatory.
min_commit_interval = 10

[test]
command = "cargo test"
required = true

[staging]
# Explicit for documentation; cluster has been the default since v9.7.17.
# The git root is the /home/sal monorepo, so "all" would stage sibling
# projects — cluster mode stages only observed cluster paths plus the version
# triple (VERSION/Cargo.toml/Cargo.lock), and fails closed if a path is gone.
mode = "cluster"
exclude = ["*.log", ".env*"]
