# kaptaind configuration — auto-generated by `kaptaind-cli init`

[watch]
path = "."
recursive = true
ignore_file = ".kaptainignore"

[cluster]
window = 5
# max_paths = 0      # flush cluster after N events (0 = disabled)
# flush_after = 10   # idle timeout in seconds (defaults to window)

[weights]
s = 0.35
a = 0.30
d = 0.20
r = 0.15

[push]
enabled = false
branch = "main"

[ratelimit]
# 30s floor between auto-commits: slows any future self-trigger pathology to a
# walk while the ignore rules (see .kaptainignore) address the root cause.
min_commit_interval = 30

[test]
command = "cargo test"
required = true

[staging]
# Cluster mode is mandatory here: the git root is the /home/sal monorepo, so
# "all" would run `git add -A` across the whole home directory and sweep in
# untracked, secret-adjacent files. Cluster mode stages only the changed
# cluster paths plus Cargo.toml/VERSION, and fails closed if a path is gone.
mode = "cluster"
exclude = ["*.log", ".env*"]
