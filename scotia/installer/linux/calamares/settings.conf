# Calamares settings for the Scotia installer.
# Run with: calamares -d /path/to/this/dir
#
# This is an OEM-style setup program (not a full OS installer): it installs
# Scotia into the running environment and optionally enables autostart.

modules-search: [local]

sequence:
  - show:
      - welcome
      - license
      - scotia_ui
      - summary
  - exec:
      - scotia
  - show:
      - finished

branding: scotia

dont-chroot: true
prompt-install: false
hide-back-and-next-during-exec: true
quit-at-end: false
