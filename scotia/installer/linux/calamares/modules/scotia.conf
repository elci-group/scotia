#
# Configuration for the Scotia install job module.
---
# Directory containing the pre-built Scotia binaries inside the installer
# payload. The Python job copies them to the chosen bin_dir before running
# `scotia installer apply`.
binary_source_dir: /usr/share/scotia/bin
