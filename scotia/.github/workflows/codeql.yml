name: CodeQL

# Static analysis for the Rust codebase. CodeQL's Rust support builds the crate
# and queries the resulting IR for injection, unsafe-usage, and logic bugs.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Weekly, off the round-minute herd.
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [rust]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: autobuild

      # autobuild runs `cargo build`. If a future CodeQL release struggles with
      # edition 2024, pin a toolchain and switch to a manual build:
      #   - uses: dtolnay/rust-toolchain@stable
      #   - run: cargo build --workspace --bins
      # and set build-mode: manual above.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
