name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies for known vulnerabilities
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Deny policy check (advisories, sources)
        run: cargo deny check advisories sources

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --lib

      # Regression guard: ensure the criterion benches still compile on every PR
      # so they cannot silently bitrot against API drift. Full benchmark runs with
      # baseline comparison are intentionally out of the PR gate (like fuzz-smoke)
      # and belong to a scheduled workflow; this keeps CI fast and deterministic.
      - name: Compile benchmarks (regression guard)
        run: cargo bench --no-run

  check-macos:
    name: Unix permission model (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      # The 0700/0600 socket-dir and token model is shared via src/runtime.rs and
      # relies on unix permission bits + unix sockets. Run its tests on macOS so
      # the guarantees are not asserted on Linux alone.
      - name: Verify runtime permission model
        run: cargo test --lib runtime
