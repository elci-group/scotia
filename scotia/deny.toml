# cargo-deny policy for Scotia. Run locally with: cargo deny check
#
# Policy: fail CI on known vulnerabilities and yanked crates; surface (warn on)
# unsound / unmaintained advisories so they stay visible instead of being
# silently swallowed. This is the policy counterpart to `cargo audit`.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# cargo-deny 0.19+ defaults implement the policy above (vulnerability/yanked
# are errors; unmaintained/unsound/notice are warnings). The per-lint level
# keys were removed upstream (cargo-deny#611), so this config uses defaults.
# Known low-severity transitive warnings, all TUI-only via `ratatui` and not
# reachable with attacker-controlled input. Tracked here rather than hidden:
#   - RUSTSEC-2024-0436  paste  (unmaintained)
#   - RUSTSEC-2026-0002  lru    (unsound; fixed in lru >= 0.16.3, pending a
#                                non-regressing ratatui upgrade)
ignore = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
